name: Deploy React App to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        env:
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        run: npm run build

      # The Vite build outputs to dist/react/ with react-app.html as entry.
      # GitHub Pages needs the entry file to be named index.html.
      - name: Prepare _site folder
        run: |
          mkdir -p _site
          cp -r dist/react/. _site/
          # Rename the Vite entry to index.html
          if [ -f _site/react-app.html ]; then
            mv _site/react-app.html _site/index.html
          fi
          # Copy the OAuth callback bridge (plain HTML, no React needed)
          cp callback.html _site/callback.html
          # Prevent Jekyll processing
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
