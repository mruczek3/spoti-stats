# Fallback deploy: use this if "Deploy to GitHub Pages" fails with Bad credentials.
# Then set Settings → Pages → Source: Deploy from branch → gh-pages → / (root)
name: Deploy to gh-pages branch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        run: |
          mkdir -p _site/assets
          cp index.html dashboard.html callback.html _site/
          cp assets/style.css assets/app.js assets/github-pages-base.js _site/assets/
          if [ -n "$SPOTIFY_CLIENT_ID" ]; then
            echo "window.SPOTIFY_CLIENT_ID = '${SPOTIFY_CLIENT_ID}';" > _site/assets/config.js
          else
            cp assets/config.example.js _site/assets/config.js
          fi
          touch _site/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
