<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Stats - Login</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Spotify Stats</h1>
                <p>Discover your listening insights</p>
            </div>

            <div class="login-body">
                <div class="spotify-icon">🎵</div>
                
                <button id="loginBtn" class="btn-spotify">
                    <span>🎧</span> Connect with Spotify
                </button>

                <div class="login-features">
                    <div class="feature">
                        <span class="icon">📊</span>
                        <span>Top Tracks & Artists</span>
                    </div>
                    <div class="feature">
                        <span class="icon">📈</span>
                        <span>Mood Timeline</span>
                    </div>
                    <div class="feature">
                        <span class="icon">🎨</span>
                        <span>Personality Profile</span>
                    </div>
                    <div class="feature">
                        <span class="icon">🌐</span>
                        <span>Genre Universe</span>
                    </div>
                </div>

            </div>

            <div class="login-footer">
                <p>Uses Spotify Web API • Secure PKCE Auth</p>
                <a href="https://spotify.com" target="_blank">Spotify</a>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        document.getElementById('loginBtn').addEventListener('click', initiateSpotifyLogin);
    </script>
</body>
</html>
